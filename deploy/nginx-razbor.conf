# Razbor — nginx reverse-proxy (заглушка, раздел 1 ТЗ).
# Установка на сервере:
#   sudo cp deploy/nginx-razbor.conf /etc/nginx/sites-available/getrazbor.ru
#   sudo ln -s /etc/nginx/sites-available/getrazbor.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Затем HTTPS одной командой (она сама допишет 443-блок и редирект):
#   sudo certbot --nginx -d getrazbor.ru -d www.getrazbor.ru
#
# getrazbor.online → редирект на .ru настроим позже отдельным server-блоком.

server {
    listen 80;
    listen [::]:80;
    server_name getrazbor.ru www.getrazbor.ru;

    # Next.js (next start) слушает localhost:3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    client_max_body_size 4m;
}
